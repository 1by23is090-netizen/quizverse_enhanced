<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}QuizVerse{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  /* ── CSS Variables ────────────────────────────── */
  :root {
    --bg:       #050714;
    --surface:  rgba(255,255,255,0.04);
    --border:   rgba(255,255,255,0.08);
    --cyan:     #00f5ff;
    --purple:   #7c3aed;
    --pink:     #f72585;
    --gold:     #ffd60a;
    --text:     #e2e8f0;
    --muted:    #94a3b8;
    --success:  #10b981;
    --danger:   #ef4444;
    --radius:   16px;
  }

  /* ── Reset & Base ─────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* ── Starfield ────────────────────────────────── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(1px 1px at 20% 30%,  rgba(255,255,255,.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 10%,  rgba(255,255,255,.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 80%,  rgba(255,255,255,.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 10% 60%,  rgba(255,255,255,.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 50%,  rgba(255,255,255,.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 90%,  rgba(255,255,255,.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 40%,  rgba(255,255,255,.6) 0%, transparent 100%),
      radial-gradient(2px 2px at 15% 15%,  rgba(0,245,255,.4)  0%, transparent 100%),
      radial-gradient(2px 2px at 85% 85%,  rgba(124,58,237,.4) 0%, transparent 100%),
      radial-gradient(2px 2px at 60% 20%,  rgba(247,37,133,.3) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* nebula glow */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 15% 50%,  rgba(124,58,237,.12) 0%, transparent 60%),
      radial-gradient(ellipse 50% 35% at 85% 20%,  rgba(0,245,255,.08)  0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 50% 90%,  rgba(247,37,133,.07) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── Layout ───────────────────────────────────── */
  .page { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; }

  /* ── Nav ──────────────────────────────────────── */
  nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.2rem 2rem;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(12px);
    background: rgba(5,7,20,.6);
    position: sticky; top: 0; z-index: 100;
  }
  .nav-brand {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900; font-size: 1.3rem;
    background: linear-gradient(90deg, var(--cyan), var(--purple));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    text-decoration: none;
  }
  .nav-links { display: flex; gap: 1.5rem; }
  .nav-links a {
    color: var(--muted); text-decoration: none; font-size: .9rem;
    letter-spacing: .05em; transition: color .2s;
    font-weight: 500;
  }
  .nav-links a:hover { color: var(--cyan); }

  /* ── Cards / Glass ───────────────────────────── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    backdrop-filter: blur(20px);
    padding: 2rem;
  }

  /* ── Buttons ─────────────────────────────────── */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: .5rem;
    padding: .75rem 2rem; border-radius: 50px; border: none;
    font-family: 'Exo 2', sans-serif; font-weight: 600; font-size: 1rem;
    cursor: pointer; text-decoration: none; transition: all .25s;
    letter-spacing: .04em;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--cyan), var(--purple));
    color: #fff;
    box-shadow: 0 0 24px rgba(0,245,255,.25);
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 40px rgba(0,245,255,.45);
  }
  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }
  .btn-outline:hover { border-color: var(--cyan); color: var(--cyan); }

  /* ── Form elements ───────────────────────────── */
  .form-group { display: flex; flex-direction: column; gap: .5rem; }
  .form-group label { font-size: .85rem; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; font-weight: 600; }
  .form-group input,
  .form-group select {
    background: rgba(255,255,255,.05);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: .8rem 1.2rem;
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    font-size: 1rem;
    transition: border-color .2s, box-shadow .2s;
    outline: none;
    -webkit-appearance: none;
  }
  .form-group input::placeholder { color: var(--muted); }
  .form-group input:focus,
  .form-group select:focus {
    border-color: var(--cyan);
    box-shadow: 0 0 0 3px rgba(0,245,255,.1);
  }
  .form-group select option { background: #0d1117; color: var(--text); }

  /* ── Badge ───────────────────────────────────── */
  .badge {
    display: inline-block; padding: .25rem .7rem; border-radius: 50px;
    font-size: .75rem; font-weight: 700; letter-spacing: .06em;
  }
  .badge-easy   { background: rgba(16,185,129,.15); color: #10b981; border: 1px solid rgba(16,185,129,.3); }
  .badge-medium { background: rgba(255,214,10,.12); color: #ffd60a; border: 1px solid rgba(255,214,10,.3); }
  .badge-hard   { background: rgba(239,68,68,.12);  color: #ef4444; border: 1px solid rgba(239,68,68,.3);  }

  /* ── Glow text ───────────────────────────────── */
  .glow-cyan   { color: var(--cyan);   text-shadow: 0 0 20px rgba(0,245,255,.5); }
  .glow-purple { color: #a78bfa;       text-shadow: 0 0 20px rgba(124,58,237,.5); }
  .glow-gold   { color: var(--gold);   text-shadow: 0 0 20px rgba(255,214,10,.5); }

  /* ── Animations ──────────────────────────────── */
  @keyframes fadeUp   { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }
  @keyframes pulse    { 0%,100% { opacity:.6; } 50% { opacity:1; } }
  @keyframes spin     { to { transform: rotate(360deg); } }
  @keyframes glow-pulse {
    0%,100% { box-shadow: 0 0 20px rgba(0,245,255,.2); }
    50%      { box-shadow: 0 0 40px rgba(0,245,255,.5); }
  }

  .fade-up { animation: fadeUp .5s ease both; }
  .fade-up-1 { animation-delay: .1s; }
  .fade-up-2 { animation-delay: .2s; }
  .fade-up-3 { animation-delay: .3s; }
  .fade-up-4 { animation-delay: .4s; }

  /* ── Footer ──────────────────────────────────── */
  footer {
    text-align: center; padding: 1.5rem;
    color: var(--muted); font-size: .8rem;
    border-top: 1px solid var(--border);
    margin-top: auto;
  }
</style>
{% block extra_head %}{% endblock %}
</head>
<body>
<div class="page">
  <nav>
    <a class="nav-brand" href="/">◈ QuizVerse</a>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/leaderboard">Leaderboard</a>
    </div>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer>
    QuizVerse &nbsp;·&nbsp; Built with Flask &amp; SQLite &nbsp;·&nbsp; {{ 2024 }} Enhanced Edition
  </footer>
</div>
</body>
</html>
